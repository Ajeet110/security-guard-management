# Render Blueprint Configuration
# This file enables one-click deployment to Render

services:
  - type: web
    name: secureguard-connect
    env: node
    region: singapore
    plan: free
    buildCommand: npm run install-all && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    
    envVars:
      - key: NODE_ENV
        value: production
      
      - key: PORT
        value: 10000
      
      - key: JWT_SECRET
        value: your-super-secret-jwt-key-change-this-in-production-123456
        
      - key: JWT_REFRESH_SECRET
        value: your-refresh-secret-key-change-this-in-production-789012
      
      - key: CLIENT_URL
        value: https://security-guard-management-ffxs.onrender.com
        
      # CRITICAL: Database path MUST match disk mountPath
      # This ensures database persists across restarts
      - key: DATABASE_URL
        value: /opt/render/project/src/server/database/secureguard.db
        
      # CRITICAL: Uploads path MUST match disk mountPath
      # This ensures uploaded files (photos, documents) persist
      - key: UPLOADS_DIR
        value: /opt/render/project/src/uploads

    # CRITICAL: Persistent disk prevents data loss
    # Without this disk, database and uploads are deleted on every restart!
    # Free tier allows 1 GB persistent storage
    # If disk is not created automatically, add it manually in Render Dashboard:
    # Dashboard → Your Service → Disks → Add Disk
    disk:
      name: data
      mountPath: /opt/render/project/src
      sizeGB: 1