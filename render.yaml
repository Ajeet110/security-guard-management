# Render Blueprint Configuration
# This file enables one-click deployment to Render

services:
  - type: web
    name: secureguard-connect
    env: node
    region: singapore
    plan: free
    buildCommand: npm run install-all && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    
    envVars:
      - key: NODE_ENV
        value: production
      
      - key: PORT
        value: 10000
      
      - key: JWT_SECRET
        value: your-super-secret-jwt-key-change-this-in-production-123456
        
      - key: JWT_REFRESH_SECRET
        value: your-refresh-secret-key-change-this-in-production-789012
      
      - key: CLIENT_URL
        fromService:
          type: web
          name: secureguard-connect
          property: url
        
      - key: DATABASE_URL
        value: /opt/render/project/src/server/database/secureguard.db
        
      - key: UPLOADS_DIR
        value: /opt/render/project/src/uploads

    # Persistent disk for database and uploads
    disk:
      name: data
      mountPath: /opt/render/project/src
      sizeGB: 1